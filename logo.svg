  <!-- Wordmark -->
  <text x="120" y="138" xml:space="preserve" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:58px;font-weight:700;text-anchor:start;dominant-baseline:auto">
    <tspan style="fill:rgb(225, 245, 238);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:58px;font-weight:700;text-anchor:start;dominant-baseline:auto">Path</tspan><tspan style="fill:rgb(159, 225, 203);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:58px;font-weight:700;text-anchor:start;dominant-baseline:auto">bloom</tspan>
